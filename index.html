<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сроки услуг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e0e0e0;
            --border: #2a2a4a;
            --accent: #0f3460;
        }

        /* Адаптация под тему Telegram */
        body.tg-light {
            --bg: #ffffff;
            --card: #f0f0f0;
            --text: #1a1a1a;
            --border: #d0d0d0;
            --accent: #e8f0fe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px 15px 30px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin: 10px 0 5px;
            font-weight: 600;
            font-size: 1.5em;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            opacity: 0.6;
            font-size: 0.85em;
        }

        /* Форма добавления */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .add-form-row {
            display: flex;
            gap: 8px;
        }

        .add-form input,
        .add-form select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            width: 100%;
            transition: border 0.2s;
            -webkit-appearance: none;
        }

        .add-form input:focus,
        .add-form select:focus {
            border-color: #4a90d9;
        }

        .add-form button {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }

        .add-form button:active {
            transform: scale(0.97);
        }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card);
            padding: 12px 8px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card .number {
            font-size: 1.8em;
            font-weight: 700;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 4px;
        }

        .stat-card.danger .number { color: var(--danger); }
        .stat-card.warning .number { color: var(--warning); }
        .stat-card.success .number { color: var(--success); }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .filters button {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .filters button.active {
            background: #4a90d9;
            border-color: #4a90d9;
            color: white;
        }

        /* Список */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .service-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.15s;
        }

        .service-card:active {
            transform: scale(0.98);
        }

        .service-card.danger {
            border-left: 4px solid var(--danger);
        }
        .service-card.warning {
            border-left: 4px solid var(--warning);
        }

        .service-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            flex-shrink: 0;
        }

        .service-icon.domain { background: rgba(74, 144, 217, 0.15); }
        .service-icon.hosting { background: rgba(155, 89, 182, 0.15); }
        .service-icon.ssl { background: rgba(46, 204, 113, 0.15); }
        .service-icon.other { background: rgba(149, 165, 166, 0.15); }

        .service-info {
            flex: 1;
            min-width: 0;
        }
        .service-name {
            font-weight: 600;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .service-type-label {
            font-size: 0.7em;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .service-dates {
            text-align: right;
            flex-shrink: 0;
        }
        .end-date {
            font-weight: 600;
            font-size: 0.9em;
        }
        .days-left {
            font-size: 0.75em;
            margin-top: 2px;
            font-weight: 500;
        }
        .days-left.expired { color: var(--danger); }
        .days-left.soon { color: var(--warning); }
        .days-left.ok { color: var(--success); }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            font-size: 1.2em;
            padding: 6px 8px;
            cursor: pointer;
            opacity: 0.4;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .delete-btn:hover { opacity: 1; background: rgba(231, 76, 60, 0.1); }

        /* Уведомления */
        .notify-section {
            background: var(--card);
            padding: 14px 16px;
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .notify-section label {
            font-size: 0.9em;
            font-weight: 500;
        }
        .notify-section select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .notify-section button {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.4;
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 10px; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9em;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 400px) {
            .service-card { padding: 10px 12px; }
            .service-icon { width: 36px; height: 36px; font-size: 1.2em; }
            .stats { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .stat-card { padding: 10px 4px; }
            .stat-card .number { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Мои услуги</h1>
        <p class="subtitle">Контроль сроков доменов, хостинга, SSL</p>

        <!-- Форма -->
        <div class="add-form">
            <input type="text" id="serviceName" placeholder="Название (например: site.ru)">
            <div class="add-form-row">
                <input type="date" id="serviceDate" style="flex:1">
                <select id="serviceType" style="flex:1">
                    <option value="domain">🌐 Домен</option>
                    <option value="hosting">🖥 Хостинг</option>
                    <option value="ssl">🔒 SSL</option>
                    <option value="other">📦 Другое</option>
                </select>
            </div>
            <button onclick="addService()">➕ Добавить услугу</button>
        </div>

        <!-- Статистика -->
        <div class="stats">
            <div class="stat-card danger">
                <div class="number" id="countExpired">0</div>
                <div class="label">Просрочено</div>
            </div>
            <div class="stat-card warning">
                <div class="number" id="countSoon">0</div>
                <div class="label">Истекает</div>
            </div>
            <div class="stat-card success">
                <div class="number" id="countOk">0</div>
                <div class="label">Активно</div>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="active" onclick="setFilter('all', this)">Все</button>
            <button onclick="setFilter('domain', this)">🌐 Домены</button>
            <button onclick="setFilter('hosting', this)">🖥 Хостинг</button>
            <button onclick="setFilter('ssl', this)">🔒 SSL</button>
            <button onclick="setFilter('other', this)">📦 Другое</button>
        </div>

        <!-- Список -->
        <div class="services-list" id="servicesList">
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>Список пуст</p>
            </div>
        </div>

        <!-- Настройки уведомлений -->
        <div class="notify-section">
            <div>
                <label>🔔 Напоминать за</label>
                <select id="notifyDays">
                    <option value="7">7 дней</option>
                    <option value="14" selected>14 дней</option>
                    <option value="30">30 дней</option>
                </select>
            </div>
            <button onclick="enableNotifications()">Включить уведомления</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ====== Telegram Web App ======
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand(); // Разворачиваем на весь экран
            // Адаптация под тему Telegram
            if (tg.colorScheme === 'light') {
                document.body.classList.add('tg-light');
            }
            tg.onEvent('themeChanged', () => {
                if (tg.colorScheme === 'light') {
                    document.body.classList.add('tg-light');
                } else {
                    document.body.classList.remove('tg-light');
                }
            });
        }

        // ====== Данные ======
        // Ключ localStorage уникальный для каждого пользователя Telegram
        const storageKey = tg?.initDataUnsafe?.user?.id 
            ? `myServices_${tg.initDataUnsafe.user.id}` 
            : 'myServices_default';
        
        let services = JSON.parse(localStorage.getItem(storageKey) || '[]');
        let currentFilter = 'all';

        document.getElementById('serviceDate').value = new Date().toISOString().split('T')[0];

        function saveServices() {
            localStorage.setItem(storageKey, JSON.stringify(services));
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function addService() {
            const name = document.getElementById('serviceName').value.trim();
            const date = document.getElementById('serviceDate').value;
            const type = document.getElementById('serviceType').value;

            if (!name) { showToast('Введите название'); return; }
            if (!date) { showToast('Выберите дату'); return; }

            services.push({
                id: Date.now(),
                name,
                endDate: date,
                type
            });

            services.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
            saveServices();
            renderServices();
            
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceName').focus();
            showToast('✅ Добавлено');
            
            // Вибрация на телефоне (если доступно)
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function deleteService(id) {
            if (confirm('Удалить услугу?')) {
                services = services.filter(s => s.id !== id);
                saveServices();
                renderServices();
                showToast('🗑 Удалено');
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        function getDaysLeft(endDateStr) {
            const endDate = new Date(endDateStr);
            endDate.setHours(0, 0, 0, 0);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
        }

        function getStatus(daysLeft) {
            if (daysLeft < 0) return 'danger';
            if (daysLeft <= 30) return 'warning';
            return 'ok';
        }

        function getStatusText(daysLeft) {
            if (daysLeft < 0) return `Просрочено на ${Math.abs(daysLeft)} дн.`;
            if (daysLeft === 0) return 'Сегодня!';
            if (daysLeft === 1) return 'Завтра!';
            if (daysLeft <= 30) return `${daysLeft} дн.`;
            return `${daysLeft} дн.`;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderServices();
        }

        function renderServices() {
            let filtered = services;
            if (currentFilter !== 'all') {
                filtered = services.filter(s => s.type === currentFilter);
            }

            // Статистика
            const allExpired = services.filter(s => getDaysLeft(s.endDate) < 0).length;
            const allSoon = services.filter(s => { const d = getDaysLeft(s.endDate); return d >= 0 && d <= 30; }).length;
            const allOk = services.filter(s => getDaysLeft(s.endDate) > 30).length;

            document.getElementById('countExpired').textContent = allExpired;
            document.getElementById('countSoon').textContent = allSoon;
            document.getElementById('countOk').textContent = allOk;

            const listEl = document.getElementById('servicesList');

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${currentFilter === 'all' ? 'Список пуст' : 'Нет услуг этого типа'}</p></div>`;
                return;
            }

            const typeIcons = { domain: '🌐', hosting: '🖥', ssl: '🔒', other: '📦' };
            const typeLabels = { domain: 'Домен', hosting: 'Хостинг', ssl: 'SSL', other: 'Другое' };

            listEl.innerHTML = filtered.map(s => {
                const daysLeft = getDaysLeft(s.endDate);
                const status = getStatus(daysLeft);
                const endDateFormatted = new Date(s.endDate).toLocaleDateString('ru-RU', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
                const statusClass = status === 'danger' ? 'expired' : status === 'warning' ? 'soon' : 'ok';

                return `
                <div class="service-card ${status}">
                    <div class="service-icon ${s.type}">${typeIcons[s.type] || '📦'}</div>
                    <div class="service-info">
                        <div class="service-name">${escapeHtml(s.name)}</div>
                        <div class="service-type-label">${typeLabels[s.type] || s.type}</div>
                    </div>
                    <div class="service-dates">
                        <div class="end-date">${endDateFormatted}</div>
                        <div class="days-left ${statusClass}">${getStatusText(daysLeft)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteService(${s.id})">✕</button>
                </div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ====== Push-уведомления ======
        let notificationInterval = null;

        async function enableNotifications() {
            if (!('Notification' in window)) {
                showToast('❌ Браузер не поддерживает уведомления');
                return;
            }

            if (Notification.permission === 'granted') {
                startNotificationCheck();
                showToast('✅ Уведомления включены');
                return;
            }

            if (Notification.permission === 'denied') {
                showToast('❌ Уведомления заблокированы. Разрешите в настройках браузера');
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                startNotificationCheck();
                showToast('✅ Уведомления включены');
            } else {
                showToast('❌ Вы отклонили уведомления');
            }
        }

        function startNotificationCheck() {
            if (notificationInterval) clearInterval(notificationInterval);
            
            const notifiedKey = storageKey + '_notified';
            let notifiedIds = JSON.parse(localStorage.getItem(notifiedKey) || '[]');
            const notifyDays = parseInt(document.getElementById('notifyDays').value);

            // Проверяем сразу
            checkAndNotify(notifiedIds, notifiedKey, notifyDays);
            
            // И каждые 6 часов
            notificationInterval = setInterval(() => {
                notifiedIds = JSON.parse(localStorage.getItem(notifiedKey) || '[]');
                checkAndNotify(notifiedIds, notifiedKey, notifyDays);
            }, 6 * 60 * 60 * 1000);
        }

        function checkAndNotify(notifiedIds, notifiedKey, notifyDays) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const expiringServices = services.filter(s => {
                const daysLeft = getDaysLeft(s.endDate);
                return daysLeft >= 0 && daysLeft <= notifyDays && !notifiedIds.includes(s.id);
            });

            if (expiringServices.length > 0) {
                const names = expiringServices.map(s => s.name).join(', ');
                new Notification('⚠️ Истекают сроки услуг', {
                    body: `До окончания менее ${notifyDays} дн.: ${names}`,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>',
                    tag: 'service-expiry',
                    requireInteraction: true
                });
                
                // Помечаем как отправленные
                expiringServices.forEach(s => notifiedIds.push(s.id));
                localStorage.setItem(notifiedKey, JSON.stringify(notifiedIds));
            }
        }

        // Обновление интервала при смене настройки
        document.getElementById('notifyDays').addEventListener('change', () => {
            if (notificationInterval) {
                const notifiedKey = storageKey + '_notified';
                localStorage.removeItem(notifiedKey); // Сбрасываем историю при смене
                startNotificationCheck();
            }
        });

        // Проверяем, были ли уже разрешены уведомления
        if (Notification.permission === 'granted') {
            startNotificationCheck();
        }

        // Enter для добавления
        document.getElementById('serviceName').addEventListener('keydown', e => {
            if (e.key === 'Enter') addService();
        });
        document.getElementById('serviceDate').addEventListener('keydown', e => {
            if (e.key === 'Enter') addService();
        });

        // Первый рендер
        renderServices();
    </script>
</body>
</html>
